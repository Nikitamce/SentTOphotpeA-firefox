<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="header__logo">
      <img src="../icons/icon.svg" alt="Logo" width="28" height="28">
      <h1 class="header__title" data-i18n="extensionName">Send to Photopea</h1>
    </div>
    <p class="header__subtitle" data-i18n="popupSubtitle">Right click on image → 🎨 Photopea</p>
  </header>

  <section class="quick">
    <button type="button" id="btn-open-photopea" class="btn btn--accent" data-i18n="btnOpenPhotopea">
      Open Photopea
    </button>
    <p class="quick__hint" data-i18n="popupShortcutHint">Shortcut: Alt+Shift+P (last image)</p>
  </section>

  <section class="presets">
    <h2 class="presets__heading" data-i18n="presetsHeading">Canvas Presets</h2>
    <ul id="preset-list" class="presets__list"></ul>
  </section>

  <section class="recent" id="recent-section" hidden>
    <h2 class="presets__heading" data-i18n="recentHeading">Recent images</h2>
    <ul id="recent-list" class="presets__list"></ul>
  </section>

  <footer class="footer">
    <button type="button" id="btn-settings" class="btn btn--settings" data-i18n-title="btnSettings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6.5.5h3l.4 2 1.2.5 1.7-1.2 2.1 2.1-1.2 1.7.5 1.2 2 .4v3l-2 .4-0.5 1.2 1.2 1.7-2.1 2.1-1.7-1.2-1.2.5-.4 2h-3l-.4-2-1.2-.5-1.7 1.2L1.1 13l1.2-1.7L1.8 10l-2-.4v-3l2-.4.5-1.2L1.1 3.3l2.1-2.1L4.9 2.4l1.2-.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.2"/></svg>
      <span data-i18n="btnSettings">Settings</span>
    </button>
  </footer>

  <template id="preset-item-template">
    <li class="preset-card preset-card--clickable" role="button" tabindex="0">
      <div class="preset-card__icon"></div>
      <div class="preset-card__info">
        <div class="preset-card__name"></div>
        <div class="preset-card__dims"></div>
      </div>
      <div class="preset-card__action" data-i18n="popupOpenBlank">Blank</div>
    </li>
  </template>

  <template id="recent-item-template">
    <li class="preset-card preset-card--clickable recent-card" role="button" tabindex="0">
      <div class="preset-card__icon">🕒</div>
      <div class="preset-card__info">
        <div class="preset-card__name recent-card__url"></div>
        <div class="preset-card__dims recent-card__time"></div>
      </div>
    </li>
  </template>

  <script src="../shared/defaults.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
