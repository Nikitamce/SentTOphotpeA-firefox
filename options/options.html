<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send to Photopea — Настройки</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="page-header">
      <div class="page-header__inner">
        <div class="page-header__logo">
          <img src="../icons/icon.svg" alt="Logo" width="48" height="48">
          <div>
            <h1 class="page-header__title" data-i18n="extensionName">Send to Photopea</h1>
            <p class="page-header__version" data-i18n="optionsHeaderSubtitle">v1.0.0 — Настройки расширения</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <section class="section">
        <div class="section__header">
          <h2 class="section__title">
            <span class="section__icon">🖼</span>
            <span data-i18n="optionsSectionHeading">Пресеты холста</span>
          </h2>
          <p class="section__desc" data-i18n="optionsSectionDesc">
            Настройте до 5 пресетов размеров холста. Активные пресеты появятся в контекстном меню при правом клике на изображение.
          </p>
        </div>

        <div id="presets-grid" class="presets-grid">
          <!-- Filled dynamically -->
        </div>
      </section>

      <!-- Action Buttons -->
      <div class="actions">
        <button id="btn-save" class="btn btn--primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2h9l3 3v9H2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M5 2v4h5V2" stroke="currentColor" stroke-width="1.3"/><path d="M4 9h8v5H4z" stroke="currentColor" stroke-width="1.3"/></svg>
          <span data-i18n="btnSave">Сохранить</span>
        </button>
        <button id="btn-reset" class="btn btn--ghost">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 1 1.8 4.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M2 12V8h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span data-i18n="btnReset">Сбросить по умолчанию</span>
        </button>
      </div>

      <!-- Toast notification -->
      <div id="toast" class="toast" aria-live="polite"></div>
    </main>

    <!-- Footer -->
    <footer class="page-footer">
      <p data-i18n="footerText">Используйте <strong>правый клик</strong> на любом изображении → <strong>🎨 Photopea</strong></p>
    </footer>
  </div>

  <!-- Preset Card Template -->
  <template id="preset-card-template">
    <div class="preset-editor">
      <div class="preset-editor__head">
        <span class="preset-editor__number"></span>
        <label class="toggle">
          <input type="checkbox" class="toggle__input" data-field="enabled">
          <span class="toggle__track"></span>
          <span class="toggle__label"></span>
        </label>
      </div>

      <div class="preset-editor__fields">
        <div class="field">
          <label class="field__label" data-i18n="labelName">Название</label>
          <input type="text" class="field__input" data-field="name" data-i18n-placeholder="placeholderName" placeholder="Название пресета" maxlength="40">
        </div>

        <div class="preset-editor__row">
          <div class="field">
            <label class="field__label" data-i18n="labelWidth">Ширина</label>
            <div class="field__suffix">
              <input type="number" class="field__input" data-field="width" min="1" max="30000" placeholder="1920">
              <span class="field__unit">px</span>
            </div>
          </div>
          <div class="field">
            <label class="field__label" data-i18n="labelHeight">Высота</label>
            <div class="field__suffix">
              <input type="number" class="field__input" data-field="height" min="1" max="30000" placeholder="1080">
              <span class="field__unit">px</span>
            </div>
          </div>
        </div>

        <div class="preset-editor__preview">
          <div class="preview-box">
            <div class="preview-box__inner"></div>
          </div>
          <span class="preview-box__label"></span>
        </div>
      </div>
    </div>
  </template>

  <script src="options.js"></script>
</body>
</html>
