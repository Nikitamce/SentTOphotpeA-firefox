<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3238" />
      <stop offset="100%" stop-color="#14181b" />
    </linearGradient>
    
    <!-- Photopea Green Gradient -->
    <linearGradient id="ppGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>

    <!-- Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Shadow filter for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)" stroke="#3f474f" stroke-width="8" filter="url(#dropShadow)" />

  <!-- Stylized Photopea "P" shape -->
  <g transform="translate(140, 120)">
    <!-- Vertical Bar -->
    <rect x="0" y="0" width="64" height="272" rx="32" fill="url(#ppGrad)" />
    
    <!-- Loop of the 'P' -->
    <path d="M 32 0 
             C 140 0, 180 30, 180 90 
             C 180 150, 140 180, 32 180" 
          fill="none" stroke="url(#ppGrad)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Send Arrow overlaying from bottom-left pointing to the 'P' loop -->
  <g filter="url(#dropShadow)">
    <path d="M 80 400 
             C 140 380, 180 340, 210 270" 
          fill="none" stroke="url(#arrowGrad)" stroke-width="24" stroke-linecap="round" />
    <polygon points="230,230 226,276 186,256" fill="url(#arrowGrad)" />
  </g>
</svg>
